# ABOUTME: Builds and deploys Flutter web to Cloudflare Pages on every merge to main
# ABOUTME: Production site at app.divine.video via the openvine-app Pages project

name: Mobile Web Production Deploy

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy to app.divine.video
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter web
        run: |
          flutter build web \
            --release \
            --tree-shake-icons \
            --optimization-level=4 \
            --pwa-strategy=none \
            --dart-define=DEFAULT_ENV=PRODUCTION \
            --dart-define=BACKEND_URL=https://api.divine.video \
            --dart-define=MEDIA_API_URL=https://api.openvine.co \
            --no-source-maps

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: >-
            pages deploy mobile/build/web
            --project-name=openvine-app
            --branch=main
            --commit-hash=${{ github.sha }}
            --commit-message="main deploy for ${{ github.sha }}"
            --commit-dirty=true
