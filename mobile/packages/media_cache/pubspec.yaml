name: media_cache
description: A reusable media caching package built on flutter_cache_manager with corrupt cache recovery and optional sync manifest lookups.
version: 0.1.0+1
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.0
  flutter: ^3.41.1

dependencies:
  clock: ^1.1.2
  cronet_http: ^1.8.0
  cupertino_http: ^3.0.2
  file: ^7.0.0
  flutter:
    sdk: flutter
  flutter_cache_manager: ^3.4.1
  http: ^1.6.0
  path: ^1.9.1
  path_provider: ^2.1.5
  sqflite: ^2.3.3+1
  unified_logger:
    path: ../unified_logger

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  sqflite_common_ffi: ^2.3.6
  very_good_analysis: ^10.0.0
