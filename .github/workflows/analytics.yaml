# ABOUTME: CI workflow for the analytics package.
# ABOUTME: Runs tests, formatting, and analysis only when analytics files change.

name: Analytics CI

on:
  push:
    branches: [main]
    paths:
      - "mobile/packages/analytics/**"
      - ".github/workflows/analytics.yaml"
  pull_request:
    branches: [main]
    paths:
      - "mobile/packages/analytics/**"
      - ".github/workflows/analytics.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@v1
    with:
      working_directory: "mobile/packages/analytics"
      min_coverage: 73
