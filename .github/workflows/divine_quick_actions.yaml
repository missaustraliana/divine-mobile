# ABOUTME: CI workflow for the divine_quick_actions package.
# ABOUTME: Runs tests, formatting, and analysis only when divine_quick_actions files change.

name: Divine Quick Actions CI

on:
  push:
    branches: [main]
    paths:
      - "mobile/packages/divine_quick_actions/**"
      - ".github/workflows/divine_quick_actions.yaml"
  pull_request:
    branches: [main]
    paths:
      - "mobile/packages/divine_quick_actions/**"
      - ".github/workflows/divine_quick_actions.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@v1
    with:
      working_directory: "mobile/packages/divine_quick_actions"
      min_coverage: 76
