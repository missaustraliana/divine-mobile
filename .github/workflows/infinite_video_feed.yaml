# ABOUTME: CI workflow for the infinite_video_feed package.
# ABOUTME: Runs tests, formatting, and analysis only when infinite_video_feed files change.

name: Infinite Video Feed CI

on:
  push:
    branches: [main]
    paths:
      - "mobile/packages/infinite_video_feed/**"
      - ".github/workflows/infinite_video_feed.yaml"
  pull_request:
    branches: [main]
    paths:
      - "mobile/packages/infinite_video_feed/**"
      - ".github/workflows/infinite_video_feed.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@v1
    with:
      working_directory: "mobile/packages/infinite_video_feed"
