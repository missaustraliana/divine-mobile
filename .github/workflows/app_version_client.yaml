# ABOUTME: CI workflow for the app_version_client package.
# ABOUTME: Runs tests, formatting, and analysis only when app_version_client files change.

name: App Version Client CI

on:
  push:
    branches: [main]
    paths:
      - "mobile/packages/app_version_client/**"
      - ".github/workflows/app_version_client.yaml"
  pull_request:
    branches: [main]
    paths:
      - "mobile/packages/app_version_client/**"
      - ".github/workflows/app_version_client.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@v1
    with:
      working_directory: "mobile/packages/app_version_client"
      min_coverage: 76
