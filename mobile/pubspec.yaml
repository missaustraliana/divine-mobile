name: openvine
description: "divine - A decentralized vine-like video sharing app powered by Nostr."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.15+504

environment:
  sdk: ^3.12.0
  flutter: ^3.44.0

workspace:
  - packages/app_update_repository
  - packages/app_version_client
  - packages/blossom_upload_service
  - packages/blurhash_service
  - packages/cache_sync
  - packages/categories_repository
  - packages/collaborator_repository
  - packages/comments_repository
  - packages/content_blocklist_repository
  - packages/content_policy
  - packages/count_formatter
  - packages/curated_list_repository
  - packages/curation_repository
  - packages/divine_ui
  - packages/db_client
  - packages/divine_camera
  - packages/divine_quick_actions
  - packages/dm_repository
  - packages/divine_video_player
  - packages/infinite_video_feed
  - packages/follow_repository
  - packages/funnelcake_api_client
  - packages/hashtag_repository
  - packages/image_metadata_stripper
  - packages/invite_api_client
  - packages/keycast_flutter
  - packages/likes_repository
  - packages/media_cache
  - packages/models
  - packages/notification_repository
  - packages/nostr_app_bridge_repository
  - packages/nostr_sdk
  - packages/nostr_client
  - packages/nostr_key_manager
  - packages/nostr_apps
  - packages/people_lists_repository
  - packages/permissions_service
  - packages/profile_repository
  - packages/reposts_repository
  - packages/sound_service
  - packages/sounds_repository
  - packages/text_sanitizer
  - packages/time_formatter
  - packages/tv_static_effect
  - packages/unified_logger
  - packages/verifier_client
  - packages/video_event_cache
  - packages/videos_repository

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  blossom_upload_service:

  # Testable time source — wraps DateTime.now/Stopwatch so fakeAsync can
  # virtualize them in tests.
  clock: ^1.1.2

  # State management
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0
  flutter_bloc: ^9.0.0
  bloc_concurrency: ^0.3.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  rxdart: ^0.28.0

  # Networking
  http: ^1.5.0
  http_parser: ^4.0.2
  web_socket_channel: ^3.0.3
  connectivity_plus: ^7.0.0
  device_info_plus: ^10.1.2
  url_launcher: ^6.3.2
  # OAuth: Uses ASWebAuthenticationSession on iOS (Apple's recommended auth flow)
  # https://developer.apple.com/documentation/authenticationservices/aswebauthenticationsession
  flutter_web_auth_2: ^4.1.0
  dio: ^5.8.0
  web: ^1.1.1
  webview_flutter: ^4.13.0
  webview_flutter_wkwebview: ^3.24.1

  permission_handler: ^12.0.1 # Handle runtime permissions

  # Camera and media
  c2pa_flutter:
    git:
      url: https://github.com/guardianproject/c2pa-flutter.git
      ref: 0.0.3
  divine_camera:
    path: packages/divine_camera
  divine_quick_actions:
    path: packages/divine_quick_actions
  divine_video_player:
    path: packages/divine_video_player
  infinite_video_feed:
    path: packages/infinite_video_feed
  dm_repository:
  video_player: ^2.9.1 # Uses native AVPlayer (iOS/macOS) and ExoPlayer (Android)
  visibility_detector: ^0.4.0+2 # Detect widget visibility for proper video control
  wakelock_plus: ^1.5.2 # Prevent screen timeout during active video recording
  image: ^4.1.7 # Image processing for GIF generation
  image_picker: ^1.2.0 # For selecting images from gallery or camera
  image_metadata_stripper:
    path: packages/image_metadata_stripper
  invite_api_client:
    path: packages/invite_api_client
  gal: ^2.3.2 # Save videos to device photo gallery
  file_selector: ^1.0.4 # For desktop file selection (macOS, Windows, Linux)

  # Cloud services (removed cloudinary_public - using Blossom instead)

  # Local persistence
  hive_ce: ^2.6.0
  hive_ce_flutter: ^2.1.0

  # Storage
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3+1
  path_provider: ^2.1.4
  flutter_secure_storage: ^9.0.0

  # Crypto (needed for Nostr)
  crypto: ^3.0.7
  bech32: ^0.2.2

  # UI/UX
  flutter_cache_manager: ^3.3.1
  share_plus: ^12.0.0 # Cross-platform sharing
  google_fonts: ^6.3.2 # For using Google Fonts including Pacifico
  flutter_svg: ^2.0.10+1 # For custom SVG icons
  blurhash_dart: ^1.2.1 # Generate blurhash for progressive image loading
  skeletonizer: ^2.1.2 # Skeleton loading animations with shimmer effect

  # Blurhash Service - Blurhash generation and decoding for image placeholders
  blurhash_service:

  cache_sync:

  # Categories Repository - Video categories from Funnelcake API
  categories_repository:

  # Collaborator Repository - Per-video pending/confirmed collaborator status
  collaborator_repository:

  # Comments Repository - NIP-22 comments on Nostr events
  comments_repository:

  # Content Blocklist Repository - Blocked users, mutual mutes, kind 30000 sync
  content_blocklist_repository:

  # Curated List Repository - NIP-51 kind 30005 curated video lists
  curated_list_repository:

  # Curation Repository - NIP-51 video curation sets and content discovery
  curation_repository:

  # Video Event Cache - Abstract interface for video event caching
  video_event_cache:

  # Sound Service - Sound effects (countdown beeps, etc.)
  sound_service:

  # Sounds Repository - Kind 1063 audio events from Nostr relays
  sounds_repository:

  # Notification Repository - Notification enrichment and grouping
  notification_repository:

  # Nostr SDK - Local package for comprehensive Nostr support
  nostr_app_bridge_repository:
  nostr_sdk:

  # Nostr Key Manager - Secure key management with hardware-backed storage
  nostr_key_manager:

  nostr_apps:

  keycast_flutter:

  # Follow Repository - Follow relationship management
  follow_repository:

  # Hashtag Repository - Hashtag search data layer
  hashtag_repository:

  # People Lists Repository - NIP-51 kind 30000 follow sets
  people_lists_repository:

  # Profile Repository - Kind 0 user metadata persistence and search
  profile_repository:

  # Models - Shared Nostr/data model definitions
  models:

  # Videos Repository - Video feed data layer
  videos_repository:

  # TV static noise effect
  tv_static_effect:

  # Content Policy — parse-gate ingress filter
  content_policy:

  # Count Formatter - Compact number formatting
  count_formatter:

  # Time Formatter - Locale-aware timestamp formatting
  time_formatter:

  # Divine UI - Shared UI components
  divine_ui:

  # Localization
  flutter_localizations:
    sdk: flutter

  # Logging
  logging: ^1.2.0
  unified_logger:

  # Verifier Client - HTTP client for verifier.divine.video identity attestations
  verifier_client:

  # Date formatting
  intl: ">=0.19.0 <1.0.0"

  # Missing dependencies required by nostr_sdk
  equatable: ^2.0.5

  # Desktop window management for proper window sizing
  window_manager: ^0.5.1
  firebase_core: ^4.4.0
  firebase_crashlytics: ^5.0.7
  firebase_analytics: ^12.1.2
  go_router: ^16.2.4
  # Runtime splash-screen control via FlutterNativeSplash.preserve/remove.
  # Used ONLY for the runtime API — do NOT add a flutter_native_splash:
  # config block or run `dart run flutter_native_splash:create`. The
  # existing platform splash assets (Android launch_background.xml with
  # Zendesk theme inheritance, iOS LaunchScreen.storyboard, Android 12+
  # values-v31 styles) are hand-authored and should not be regenerated.
  # See #2749 and #2953 for context on the welcome-screen flash fix.
  flutter_native_splash: ^2.4.7
  flutter_local_notifications: ^21.0.0
  package_info_plus: ^9.0.0
  uuid: ^4.5.1
  app_links: ^6.4.1
  drift: ^2.29.0
  # SQLCipher at-rest encryption for the local DB (#570, finding C2). Replaces
  # sqlite3_flutter_libs (the two cannot coexist — both ship a native sqlite3
  # and collide on iOS/macOS). 0.6.x is the SQLCipher build for the sqlite3 2.x
  # family; 0.7.0+ is an EOL no-op. sqlite3 is a direct dep so the Android
  # native-library override (package:sqlite3/open.dart) is referenceable.
  # drift_flutter was removed: it is unused (db_client opens NativeDatabase
  # directly) and it transitively pulled sqlite3_flutter_libs back in,
  # reintroducing the collision.
  sqlcipher_flutter_libs: ^0.6.8
  sqlite3: ^2.7.6
  video_player_web_hls: ^1.3.0
  firebase_performance: ^0.11.1+4
  firebase_messaging: ^16.1.1
  convert: ^3.1.2
  audio_session: ^0.2.2
  pro_video_editor: ^1.19.0
  pro_image_editor: ^12.5.1
  flutter_colorpicker: ^1.1.0
  file_picker: ^10.3.7
  sensors_plus: ^7.0.0
  stream_transform: ^2.1.1
  flutter_staggered_grid_view: ^0.7.0
  qr_flutter: ^4.1.0
  android_intent_plus: ^6.0.0
  app_device_integrity: ^1.1.0
  pointer_interceptor: ^0.10.1+2
  volume_controller: ^3.4.4

dependency_overrides:
  device_info_plus: ^10.1.2
  rxdart: ^0.28.0
  cryptography_flutter:
    path: overrides/cryptography_flutter-2.3.2
  app_device_integrity:
    path: overrides/app_device_integrity-1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  patrol: ^4.2.0
  flutter_launcher_icons: ^0.14.4

  very_good_analysis: ^10.2.0

  # Testing
  fake_async: ^1.3.3
  mocktail: ^1.0.3
  bloc_test: ^10.0.0

  # Code generation
  # TODO(#3142): Unpin after build_runner >2.11.0 fixes InvalidTypeException
  # with riverpod_generator. See https://github.com/dart-lang/build/issues
  build_runner: ">=2.7.1 <2.11.0"
  hive_ce_generator: ^1.6.0

  # Integration test utilities
  postgres: ^3.5.0

  # CLI tools
  args: ^2.4.2
  riverpod_generator: ^3.0.0
  # custom_lint: ^0.6.4  # Temporarily disabled due to rxdart version conflict
  # riverpod_lint: ^2.3.10  # Depends on custom_lint
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  path: any
  yaml: any
  golden_toolkit: ^0.15.0
  alchemist: ^0.12.1
  async: ^2.13.0
  drift_dev: ^2.29.0
  melos: ^7.3.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  generate: true
  config:
    enable-swift-package-manager: true
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/videos/
    - assets/sounds/
    - assets/sounds/sound-bot/
    - assets/categories/
    - assets/top_1000_hashtags.json
    - assets/fonts/
    - google_fonts/
    - assets/icon/
    - assets/loading-brand.gif
    - assets/loading-brand-sprite.png
    - assets/seed_data/seed_events.json
    - assets/seed_data/classic_viner_profiles.json
    - assets/seed_media/manifest.json
    - assets/seed_media/videos/
    - assets/seed_media/thumbnails/
    - assets/seed_media/classic_viner_avatars/
    - assets/stickers/
    - shorebird.yaml

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: Pacifico
      fonts:
        - asset: assets/fonts/Pacifico-Regular.ttf
    - family: BricolageGrotesque
      fonts:
        - asset: assets/fonts/BricolageGrotesque-Bold.ttf
          weight: 700
        - asset: assets/fonts/BricolageGrotesque-ExtraBold.ttf
          weight: 800
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

# Flutter launcher icons configuration
flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#00B488"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

patrol:
  app_name: divine
  test_directory: integration_test
  android:
    package_name: co.openvine.app
  ios:
    bundle_id: co.openvine.app

melos:
  useRootAsPackage: true

  scripts:
    generate: melos exec --depends-on build_runner -- dart run build_runner build -d
