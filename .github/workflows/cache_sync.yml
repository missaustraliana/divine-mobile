# ABOUTME: CI workflow for the cache_sync package.
# ABOUTME: Runs tests, formatting, analysis and coverage gate only when cache_sync files change.

name: Cache Sync CI

on:
  push:
    branches: [main]
    paths:
      - "mobile/packages/cache_sync/**"
      - ".github/workflows/cache_sync.yml"
  pull_request:
    branches: [main]
    paths:
      - "mobile/packages/cache_sync/**"
      - ".github/workflows/cache_sync.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@v1
    with:
      working_directory: "mobile/packages/cache_sync"
      coverage_excludes: "**/*.g.dart"
