name: Mobile CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generated-files:
    name: Generated Files
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: mobile/
    steps:
      - uses: actions/checkout@v4
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: "stable"
          cache: true
      - name: 📦 Install dependencies
        run: flutter pub get
      - name: 🔒 Verify native transport security
        run: |
          if ! command -v xmllint >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends libxml2-utils
          fi
          bash scripts/check_native_transport_security.sh
      - name: 🪵 Verify no raw logging in production code
        run: bash scripts/check_raw_logging.sh
      - name: 🌐 Verify no untagged test mutates HttpOverrides.global
        run: bash scripts/check_http_overrides_isolation.sh
      - name: 🧬 Verify no untagged test leaks a process-global singleton
        run: bash scripts/check_process_global_mutations.sh
      - name: 🚧 Verify Riverpod boundary (@riverpod / StateProvider locations)
        run: bash scripts/check_riverpod_boundary.sh
      - name: 🚧 Verify ChangeNotifier boundary (sanctioned-allowlist ratchet)
        run: bash scripts/check_changenotifier_boundary.sh
      - name: 🚧 Verify UI does not import services directly (layering ratchet)
        run: |
          # Provide origin/main so the ratchet can compare the baseline against
          # the base ref. The fetch is intentionally not error-suppressed: a
          # fetch failure must fail the job (the guard fails closed when the
          # base baseline cannot be loaded).
          git fetch --quiet --depth=1 origin main
          bash scripts/check_ui_service_boundary.sh
      - name: 🧪 Verify skipped-test count does not increase (skip-ceiling ratchet)
        run: |
          # origin/main was already fetched by the layering-ratchet step above;
          # fetch again so this step is order-independent. The guard fails closed
          # if the base baseline cannot be loaded. Skip-debt epic: #4337 (WS-1).
          git fetch --quiet --depth=1 origin main
          bash scripts/check_skip_ceiling.sh
      - name: ⏳ Verify Future.delayed-in-tests count does not increase (ratchet)
        run: |
          git fetch --quiet --depth=1 origin main
          bash scripts/check_future_delayed_ceiling.sh
      - name: ⏳ Verify Future.delayed-in-production count does not increase (ratchet)
        run: |
          # Production (mobile/lib) counterpart of the test-scoped ratchet above.
          # Fails closed if the base baseline cannot be loaded. Epic: #4339 (PR-4).
          git fetch --quiet --depth=1 origin main
          bash scripts/check_future_delayed_production_ceiling.sh
      - name: 🧱 Verify untested-services count does not increase (floor ratchet)
        run: |
          git fetch --quiet --depth=1 origin main
          bash scripts/check_untested_services_floor.sh
      - name: 🧯 Verify empty-catch count does not increase (reliability ratchet)
        run: |
          # Reliability ceilings (epic #4336). Each fails closed if the base
          # baseline cannot be loaded.
          git fetch --quiet --depth=1 origin main
          bash scripts/check_empty_catch_ceiling.sh
      - name: 🧯 Verify service error-sentinel count does not increase (reliability ratchet)
        run: |
          git fetch --quiet --depth=1 origin main
          bash scripts/check_service_sentinel_ceiling.sh
      - name: 🧯 Verify ARB {error}-interpolation count does not increase (reliability ratchet)
        run: |
          git fetch --quiet --depth=1 origin main
          bash scripts/check_arb_error_ceiling.sh
      - name: 📏 Verify file sizes do not grow (file-size ceiling ratchet)
        run: |
          # origin/main provides the base ref so the per-file ceiling ratchet can
          # detect a raised ceiling / added file. Fails closed if it cannot load
          # the base baseline. Oversized-file epic: #4339 (PR-1).
          git fetch --quiet --depth=1 origin main
          bash scripts/check_file_size_ceiling.sh
      - name: 🔨 Verify generated files are up-to-date
        run: |
          dart run build_runner build --delete-conflicting-outputs
          if [ -n "$(git status --porcelain)" ]; then
            echo "⚠️ Generated files are out of date. Please run 'dart run build_runner build' and commit the changes."
            git diff --name-only
            exit 1
          fi
      - name: 🌐 Verify l10n generated files
        run: |
          flutter gen-l10n
          if [ -n "$(git status --porcelain)" ]; then
            echo "⚠️ L10n generated files are out of date. Please run 'flutter gen-l10n' and commit the changes."
            git diff --name-only
            exit 1
          fi
  format:
    name: Format
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: mobile/
    steps:
      - uses: actions/checkout@v4
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: "stable"
          cache: true
      - name: 📦 Install dependencies
        run: flutter pub get
      - name: ✨ Check formatting
        run: dart format --output=none --set-exit-if-changed lib test integration_test
  analyze:
    name: Analyze
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: mobile/
    steps:
      - uses: actions/checkout@v4
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: "stable"
          cache: true
      - name: 📦 Install dependencies
        run: flutter pub get
      - name: 🕵️ Analyze code
        run: flutter analyze lib test integration_test
  tests:
    name: Tests
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: mobile/
    steps:
      - uses: actions/checkout@v4
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: "stable"
          cache: true
      - name: 📦 Install dependencies
        run: flutter pub get
      - name: 🛠️ Install Very Good CLI
        run: dart pub global activate very_good_cli
      - name: 🚀 Run Flutter tests
        # concurrency=4 matches the ubuntu runner's 4 vCPUs. The merged runner
        # alongside the tagged files runs race-free at 4 (verified locally at 4
        # and 6) with every skip_very_good_optimization tag still present — no
        # AppDatabase "database is locked", no path_provider collisions (#3137).
        # concurrency=1 once pushed the job past 1 hour because each tagged file
        # pays a full Dart VM startup; a higher ceiling overlaps those startups.
        run: very_good test --optimization --concurrency=4 --exclude-tags integration --test-randomize-ordering-seed random
  vgv-tag-gate:
    name: VGV Tag Gate
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: mobile/
    steps:
      - uses: actions/checkout@v4
      - name: 🏷️ Verify skip_very_good_optimization tag count does not increase
        # Guards #3137. The tag set drifts silently: a feature PR can add a
        # new `@Tags(['skip_very_good_optimization'])` opt-out without anyone
        # noticing, growing the CI debt. This step fails the PR when the
        # count exceeds `test/vgv_tag_baseline.txt`. Decreases are always
        # allowed; untag PRs may (but don't have to) lower the baseline to
        # ratchet progress — lowering makes the gate tighter for future PRs.
        run: |
          baseline=$(cat test/vgv_tag_baseline.txt | tr -d '[:space:]')
          current=$(grep -rln "skip_very_good_optimization" test | wc -l | tr -d '[:space:]')
          if [ "$current" -gt "$baseline" ]; then
            echo "❌ VGV tag count increased: baseline=$baseline, current=$current"
            echo ""
            echo "A new '@Tags([\"skip_very_good_optimization\"])' was added."
            echo "Either:"
            echo "  (a) fix the underlying test-isolation issue so the file"
            echo "      passes under the VGV optimizer without the tag, or"
            echo "  (b) if the tag is genuinely permanent (e.g. the file uses"
            echo "      IntegrationTestWidgetsFlutterBinding), add an inline"
            echo "      '// Permanent: <reason>' comment next to the tag AND"
            echo "      update mobile/test/vgv_tag_baseline.txt to $current."
            exit 1
          fi
          echo "✅ VGV tag count OK: current=$current, baseline=$baseline"
  mobile-ci:
    name: Mobile CI
    if: ${{ always() }}
    needs:
      - generated-files
      - format
      - analyze
      - tests
      - vgv-tag-gate
    runs-on: ubuntu-24.04
    steps:
      - name: Verify upstream jobs
        env:
          GENERATED_FILES_RESULT: ${{ needs.generated-files.result }}
          FORMAT_RESULT: ${{ needs.format.result }}
          ANALYZE_RESULT: ${{ needs.analyze.result }}
          TESTS_RESULT: ${{ needs.tests.result }}
          VGV_TAG_GATE_RESULT: ${{ needs.vgv-tag-gate.result }}
        run: |
          echo "generated-files: ${GENERATED_FILES_RESULT}"
          echo "format: ${FORMAT_RESULT}"
          echo "analyze: ${ANALYZE_RESULT}"
          echo "tests: ${TESTS_RESULT}"
          echo "vgv-tag-gate: ${VGV_TAG_GATE_RESULT}"

          if [[ "${GENERATED_FILES_RESULT}" != "success" || \
                "${FORMAT_RESULT}" != "success" || \
                "${ANALYZE_RESULT}" != "success" || \
                "${TESTS_RESULT}" != "success" || \
                "${VGV_TAG_GATE_RESULT}" != "success" ]]; then
            echo "One or more Mobile CI jobs failed."
            exit 1
          fi
