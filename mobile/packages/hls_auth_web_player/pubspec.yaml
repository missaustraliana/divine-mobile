name: hls_auth_web_player
description: >-
  Web-only Flutter video player that wraps hls.js and attaches NIP-98
  authorization headers per segment/manifest request.
version: 0.1.0+1
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.0
  flutter: ^3.41.1

dependencies:
  flutter:
    sdk: flutter
  unified_logger:
    path: ../unified_logger

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.0.0
