# ABOUTME: Deploys a trusted divine-mobile PR preview artifact to the openvine-app Cloudflare Pages project
# ABOUTME: Uses workflow_run so fork PRs can build safely without exposing Cloudflare secrets to untrusted code

name: Mobile PR Preview Deploy

on:
  workflow_run:
    workflows: ["Mobile PR Preview Build"]
    types: [completed]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  deploy-preview:
    name: Deploy PR Preview To Cloudflare
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-24.04-16core
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download preview artifact
        uses: actions/download-artifact@v5
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}
          name: mobile-pr-preview
          path: artifact

      - name: Extract preview metadata
        id: metadata
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          metadata = json.loads(Path("artifact/pr-web-preview-metadata.json").read_text())
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"pr_number={metadata['pr_number']}\n")
              output.write(f"head_ref={metadata['head_ref']}\n")
              output.write(f"head_sha={metadata['head_sha']}\n")
              output.write(f"preview_branch=pr-{metadata['pr_number']}\n")
              output.write(
                  f"deploy_commit_message=PR #{metadata['pr_number']} preview deploy for {metadata['head_sha']}\n"
              )
          PY

      - name: Check artifact freshness against current PR head
        id: freshness
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ steps.metadata.outputs.pr_number }}');
            const artifactSha = '${{ steps.metadata.outputs.head_sha }}';

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const deployable = pr.state === 'open' && pr.head.sha === artifactSha;

            core.setOutput('deployable', deployable ? 'true' : 'false');
            core.setOutput('current_sha', pr.head.sha);
            core.setOutput('pr_state', pr.state);

      - name: Skip stale preview artifact
        if: ${{ steps.freshness.outputs.deployable != 'true' }}
        run: |
          echo "Skipping stale preview artifact."
          echo "PR state: ${{ steps.freshness.outputs.pr_state }}"
          echo "Artifact SHA: ${{ steps.metadata.outputs.head_sha }}"
          echo "Current PR SHA: ${{ steps.freshness.outputs.current_sha }}"

      - name: Extract preview site
        if: ${{ steps.freshness.outputs.deployable == 'true' }}
        run: tar -xzf artifact/pr-web-preview-site.tar.gz -C artifact

      - name: Check Cloudflare deployment secrets
        if: ${{ steps.freshness.outputs.deployable == 'true' }}
        id: secrets
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CLOUDFLARE_ACCOUNT_ID" ] && [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Minimize outdated preview comments
        if: ${{ steps.freshness.outputs.deployable == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ steps.metadata.outputs.pr_number }}');
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const previewComments = comments.filter(
              (c) => c.body && c.body.includes('## Mobile PR Preview') &&
                     c.user && c.user.type === 'Bot',
            );

            for (const comment of previewComments) {
              await github.graphql(`
                mutation($id: ID!) {
                  minimizeComment(input: {subjectId: $id, classifier: OUTDATED}) {
                    minimizedComment { isMinimized }
                  }
                }
              `, { id: comment.node_id });
            }

            core.info(`Minimized ${previewComments.length} outdated preview comment(s).`);

      - name: Render blocked preview comment
        if: ${{ steps.freshness.outputs.deployable == 'true' && steps.secrets.outputs.configured != 'true' }}
        id: blocked_comment
        env:
          HEAD_REF: ${{ steps.metadata.outputs.head_ref }}
          HEAD_SHA: ${{ steps.metadata.outputs.head_sha }}
          PREVIEW_BRANCH: ${{ steps.metadata.outputs.preview_branch }}
        run: |
          updated_at="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          comment_file="${RUNNER_TEMP}/mobile-pr-preview-blocked.md"

          python3 .github/scripts/mobile_pr_preview_comment.py \
            --mode blocked \
            --sha "${HEAD_SHA}" \
            --updated-at "${updated_at}" \
            --run-url "${run_url}" \
            --preview-branch "${PREVIEW_BRANCH}" \
            --head-ref "${HEAD_REF}" \
            > "${comment_file}"

          echo "comment_file=${comment_file}" >> "$GITHUB_OUTPUT"

      - name: Comment missing preview configuration
        if: ${{ steps.freshness.outputs.deployable == 'true' && steps.secrets.outputs.configured != 'true' }}
        uses: actions/github-script@v7
        env:
          PREVIEW_COMMENT_FILE: ${{ steps.blocked_comment.outputs.comment_file }}
        with:
          script: |
            const prNumber = Number('${{ steps.metadata.outputs.pr_number }}');
            const fs = require('fs');
            const body = fs.readFileSync(process.env.PREVIEW_COMMENT_FILE, 'utf8');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

      - name: Deploy preview to Cloudflare Pages
        if: ${{ steps.freshness.outputs.deployable == 'true' && steps.secrets.outputs.configured == 'true' }}
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: >-
            pages deploy artifact/web
            --project-name=openvine-app
            --branch=${{ steps.metadata.outputs.preview_branch }}
            --commit-hash=${{ steps.metadata.outputs.head_sha }}
            --commit-message="${{ steps.metadata.outputs.deploy_commit_message }}"
            --commit-dirty=true

      - name: Render deployed preview comment
        if: ${{ steps.freshness.outputs.deployable == 'true' && steps.secrets.outputs.configured == 'true' }}
        id: deployed_comment
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          HEAD_REF: ${{ steps.metadata.outputs.head_ref }}
          HEAD_SHA: ${{ steps.metadata.outputs.head_sha }}
          PREVIEW_BRANCH: ${{ steps.metadata.outputs.preview_branch }}
        run: |
          updated_at="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          comment_file="${RUNNER_TEMP}/mobile-pr-preview-deployed.md"

          python3 .github/scripts/mobile_pr_preview_comment.py \
            --mode deployed \
            --sha "${HEAD_SHA}" \
            --updated-at "${updated_at}" \
            --run-url "${run_url}" \
            --preview-branch "${PREVIEW_BRANCH}" \
            --head-ref "${HEAD_REF}" \
            --deployment-url "${DEPLOYMENT_URL}" \
            > "${comment_file}"

          echo "comment_file=${comment_file}" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        if: ${{ steps.freshness.outputs.deployable == 'true' && steps.secrets.outputs.configured == 'true' }}
        uses: actions/github-script@v7
        env:
          PREVIEW_COMMENT_FILE: ${{ steps.deployed_comment.outputs.comment_file }}
        with:
          script: |
            const prNumber = Number('${{ steps.metadata.outputs.pr_number }}');
            const fs = require('fs');
            const body = fs.readFileSync(process.env.PREVIEW_COMMENT_FILE, 'utf8');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
