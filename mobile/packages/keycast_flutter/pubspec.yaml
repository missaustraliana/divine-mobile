name: keycast_flutter
description: "Flutter library for Keycast OAuth authentication with PKCE and BYOK support for Nostr"
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.11.0

resolution: workspace

dependencies:
  crypto: ^3.0.7
  flutter:
    sdk: flutter
  flutter_secure_storage: ^9.0.0
  http: ^1.5.0
  nostr_sdk:
    path: ../nostr_sdk
  unified_logger:
    path: ../unified_logger

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.3
  very_good_analysis: ^10.2.0
