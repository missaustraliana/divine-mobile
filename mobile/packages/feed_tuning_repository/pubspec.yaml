name: feed_tuning_repository
description: >-
  Publishes Divine "feed-tuning" signals (swipe more/less like this) as
  append-only Nostr events for funnelcake/Gorse to personalize recommendations.
version: 0.1.0+1
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.17.0
  models:
    path: ../models
  nostr_client:
    path: ../nostr_client
  nostr_sdk:
    path: ../nostr_sdk

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^10.2.0
