include: package:very_good_analysis/analysis_options.yaml

# These relaxations mirror the app's analysis_options.yaml. The analytics code
# was extracted from lib/services/ and was authored under the app's lint
# configuration; mirroring it here avoids introducing new lint debt during the
# move while keeping the package on the same very_good_analysis baseline.
analyzer:
  exclude:
    - "build/**"
    - "**/*.g.dart"
  errors:
    avoid_catches_without_on_clauses: ignore
    cascade_invocations: ignore
    comment_references: ignore
    constant_identifier_names: ignore
    discarded_futures: ignore
    inference_failure_on_function_return_type: ignore
    map_value_type_not_assignable: ignore
    sort_constructors_first: ignore
    unawaited_futures: ignore

linter:
  rules:
    avoid_dynamic_calls: false
    depend_on_referenced_packages: false
    flutter_style_todos: false
    lines_longer_than_80_chars: false
    public_member_api_docs: false
    sort_pub_dependencies: false
