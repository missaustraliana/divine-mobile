name: image_metadata_stripper
description: Strips EXIF metadata (GPS, device info) from images via native APIs.
version: 0.0.1
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.0
  flutter: ^3.41.1

dependencies:
  flutter:
    sdk: flutter
  image: ^4.1.7
  unified_logger:
    path: ../unified_logger

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.0.0

flutter:
  plugin:
    platforms:
      android:
        package: co.openvine.image_metadata_stripper
        pluginClass: ImageMetadataStripperPlugin
      ios:
        pluginClass: ImageMetadataStripperPlugin
      macos:
        pluginClass: ImageMetadataStripperPlugin
