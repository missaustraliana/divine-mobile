# ABOUTME: Dart test configuration for Flutter tests
# ABOUTME: Configures timeouts, platforms, and registered test tags

# NOTE: package:test has no `exclude:` or `shuffle:` config keys — unknown
# keys are silently ignored — and the very_good --optimization bundler
# collects every *_test.dart under test/ regardless of this file (#5738).
# The only mechanism that removes a file from the merged CI suite is a
# file-level @Tags(['skip_very_good_optimization']) annotation.

# Test timeouts (in seconds)
# Default timeout for all tests
timeout: 10m

# Platforms to test on (can override with --platform flag)
platforms:
  - vm

# Reporter configuration
reporter: expanded

# Registered test tags
tags:
  golden:
    timeout: 10m
  integration:
    timeout: 10m
  skip_very_good_optimization:
  service:
    timeout: 10m

chain_stack_traces: true
