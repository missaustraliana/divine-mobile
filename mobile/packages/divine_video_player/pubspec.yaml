name: divine_video_player
description: >-
  Seamless multi-clip video player using native platform APIs.
  Supports Android (Media3/ExoPlayer), iOS (AVFoundation), and
  macOS (AVFoundation).
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.11.0
  flutter: ^3.41.1

dependencies:
  flutter:
    sdk: flutter
  media_kit: ^1.2.6
  media_kit_libs_video: ^1.0.7
  media_kit_video:
    git:
      url: https://github.com/divinevideo/media-kit
      ref: 6b718491261e40ddebf1fe9b880b3d5d30205ee0
      path: media_kit_video
  path_provider: ^2.1.5
  unified_logger:
    path: ../unified_logger

dev_dependencies:
  fake_async: ^1.3.3
  flutter_test:
    sdk: flutter
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.0
  very_good_analysis: ^10.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.divinevideo.divine_video_player
        pluginClass: DivineVideoPlayerPlugin
      ios:
        pluginClass: DivineVideoPlayerPlugin
      macos:
        pluginClass: DivineVideoPlayerPlugin
      linux:
        dartPluginClass: DivineVideoPlayerLinuxPlugin
