# ABOUTME: CI workflow for the app_update_repository package.
# ABOUTME: Runs tests, formatting, and analysis only when app_update_repository files change.

name: App Update Repository CI

on:
  push:
    branches: [main]
    paths:
      - "mobile/packages/app_update_repository/**"
      - ".github/workflows/app_update_repository.yaml"
  pull_request:
    branches: [main]
    paths:
      - "mobile/packages/app_update_repository/**"
      - ".github/workflows/app_update_repository.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/flutter_package.yml@v1
    with:
      working_directory: "mobile/packages/app_update_repository"
      min_coverage: 89
